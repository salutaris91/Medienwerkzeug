name: medienwerkzeug-orbstack-test

services:
  medienwerkzeug:
    image: "${MW_TEST_IMAGE:-medienwerkzeug:orbstack-local}"
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medienwerkzeug-orbstack-test
    user: "${MW_TEST_UID:-1000}:${MW_TEST_GID:-1000}"
    ports:
      - "127.0.0.1:5812:5001"
    environment:
      TZ: Europe/Berlin
      MW_RUNTIME: docker
    volumes:
      - ./.runtime-test/config:/config
      - ./.runtime-test/media-run:/media
    labels:
      com.medienwerkzeug.purpose: local-acceptance-test
      com.medienwerkzeug.test-source: "${MW_TEST_SOURCE:-unknown}"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:5001/api/healthz"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: "no"
