services:
  medienwerkzeug:
    image: ghcr.io/dein-username/medienwerkzeug:latest # Ersetze dein-username durch deinen GitHub-Namen
    container_name: medienwerkzeug
    build: . # Für lokale Builds
    user: "${PUID:-1000}:${PGID:-1000}"
    ports:
      - "5811:5001"
    environment:
      - TZ=Europe/Berlin
      - MW_RUNTIME=docker
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    volumes:
      - ./config:/config
      - /path/to/nas/media:/media # Passe diesen Pfad an deinen NAS-Mount an
    # Optional: Hardware-Encoding auf Intel/VAAPI-fähigen NAS-Systemen.
    # Nur aktivieren, wenn auf dem Host /dev/dri existiert.
    # Danach prüfen mit: docker exec -it medienwerkzeug ls -l /dev/dri
    # devices:
    #   - /dev/dri:/dev/dri
    # group_add:
    #   - video
    #   - render
    restart: unless-stopped
