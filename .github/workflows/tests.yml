name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Spiegelt die Laufzeit-Abhängigkeiten des Dockerfiles plus pytest.
          pip install -r requirements.txt yt-dlp pytest

      - name: Run unit tests
        run: pytest -q
